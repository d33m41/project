<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUORUM — Училищни събития</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16294D;
  --ink-soft:#3A4D72;
  --paper:#ECEEE3;
  --paper-deep:#E2E5D6;
  --card:#FFFFFF;
  --brass:#B8893B;
  --brass-soft:#E7D3AC;
  --confirmed:#2F6F4F;
  --confirmed-bg:#E3EFE6;
  --waitlist:#B5681F;
  --waitlist-bg:#F6E6D2;
  --danger:#A23E33;
  --danger-bg:#F3E0DC;
  --line:rgba(22,41,77,0.16);
  --shadow:0 14px 30px -18px rgba(22,41,77,0.35);
  --radius:3px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    linear-gradient(var(--paper),var(--paper)) ,
    repeating-linear-gradient(0deg, rgba(22,41,77,0.025) 0px, rgba(22,41,77,0.025) 1px, transparent 1px, transparent 28px);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif; letter-spacing:-0.01em;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* layout shell */
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 28px;
  background:var(--ink); color:var(--paper);
  border-bottom:4px solid var(--brass);
}
.brand{display:flex; align-items:baseline; gap:10px;}
.brand .mark{font-family:'Space Grotesk'; font-weight:700; font-size:22px; letter-spacing:0.04em;}
.brand .tag{font-family:'IBM Plex Mono'; font-size:11px; color:var(--brass-soft); letter-spacing:0.06em; text-transform:uppercase;}
.nav-links{display:flex; gap:4px; align-items:center;}
.nav-btn{
  background:transparent; border:1px solid transparent; color:var(--paper);
  padding:8px 14px; border-radius:var(--radius); font-size:14px; font-weight:500;
  transition:background .15s, border-color .15s;
}
.nav-btn:hover{background:rgba(255,255,255,0.08);}
.nav-btn.active{border-color:var(--brass); color:var(--brass-soft);}
.user-chip{
  display:flex; align-items:center; gap:10px; font-size:13px;
}
.role-tag{
  font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:.08em;
  padding:3px 7px; border:1px solid var(--brass); color:var(--brass-soft); border-radius:2px;
}
.logout-btn{background:none; border:1px solid rgba(255,255,255,0.3); color:var(--paper); padding:6px 11px; border-radius:var(--radius); font-size:12px;}
.logout-btn:hover{border-color:var(--paper);}

main{max-width:1180px; margin:0 auto; padding:36px 28px 120px;}

.page-head{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:26px; flex-wrap:wrap;}
.page-head h1{font-size:30px; margin:0 0 6px; font-weight:700;}
.page-head p{margin:0; color:var(--ink-soft); font-size:14px; max-width:520px;}
.eyebrow{font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--brass); margin:0 0 8px;}

.btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 18px; border-radius:var(--radius); border:1.5px solid var(--ink);
  background:var(--ink); color:var(--paper); font-size:13.5px; font-weight:600;
  transition:transform .12s ease, box-shadow .12s ease;
}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow);}
.btn:active{transform:translateY(0);}
.btn.ghost{background:transparent; color:var(--ink);}
.btn.brass{background:var(--brass); border-color:var(--brass); color:#2A1D05;}
.btn.danger{background:var(--danger); border-color:var(--danger); color:#fff;}
.btn.small{padding:6px 12px; font-size:12px;}
.btn[disabled]{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}

/* index card (signature element) */
.card-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:22px;}
.card{
  position:relative; background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); padding:22px 20px 18px; box-shadow:0 1px 0 rgba(22,41,77,0.05);
  animation:rise .45s ease both;
}
.card::before{
  content:""; position:absolute; top:-1px; left:14px; right:14px; height:9px;
  background-image:radial-gradient(circle at 9px 0, var(--paper) 5.5px, transparent 6px);
  background-size:18px 9px; background-repeat:repeat-x;
}
@keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
.card-grid .card:nth-child(1){animation-delay:.02s;}
.card-grid .card:nth-child(2){animation-delay:.07s;}
.card-grid .card:nth-child(3){animation-delay:.12s;}
.card-grid .card:nth-child(4){animation-delay:.17s;}
.card-grid .card:nth-child(5){animation-delay:.22s;}
.card-grid .card:nth-child(6){animation-delay:.27s;}

.stamp{
  position:absolute; top:16px; right:-6px; transform:rotate(6deg);
  font-family:'IBM Plex Mono'; font-size:10px; font-weight:600; letter-spacing:.08em;
  padding:4px 9px; border:1.5px solid currentColor; border-radius:2px; text-transform:uppercase;
}
.stamp.PUBLISHED, .stamp.CONFIRMED{color:var(--confirmed); background:var(--confirmed-bg);}
.stamp.DRAFT{color:var(--ink-soft); background:var(--paper-deep);}
.stamp.WAITLISTED{color:var(--waitlist); background:var(--waitlist-bg);}
.stamp.CANCELLED{color:var(--danger); background:var(--danger-bg);}
.stamp.FULL{color:var(--danger); background:var(--danger-bg);}

.card h3{margin:6px 30px 4px 0; font-size:18px; line-height:1.3;}
.card .desc{font-size:13px; color:var(--ink-soft); line-height:1.5; margin:0 0 14px; min-height:34px;}
.meta-row{display:flex; flex-direction:column; gap:5px; font-family:'IBM Plex Mono'; font-size:12px; color:var(--ink); margin-bottom:14px; border-top:1px dashed var(--line); padding-top:12px;}
.meta-row span b{color:var(--ink-soft); font-weight:500;}
.cap-bar{height:5px; background:var(--paper-deep); border-radius:3px; overflow:hidden; margin:4px 0 2px;}
.cap-bar i{display:block; height:100%; background:var(--brass);}
.card-foot{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}

/* panels / forms */
.panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:24px; box-shadow:0 1px 0 rgba(22,41,77,0.04);}
.two-col{display:grid; grid-template-columns:1.1fr 0.9fr; gap:24px;}
@media (max-width:880px){ .two-col{grid-template-columns:1fr;} }

.field{display:flex; flex-direction:column; gap:6px; margin-bottom:16px;}
.field label{font-size:12px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em;}
.field input, .field textarea, .field select{
  border:1.5px solid var(--line); border-radius:var(--radius); padding:10px 12px; font-size:14px;
  font-family:'Inter'; background:#fff; color:var(--ink);
}
.field input:focus, .field textarea:focus, .field select:focus{border-color:var(--ink);}
.field textarea{resize:vertical; min-height:70px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.hint{font-size:11.5px; color:var(--ink-soft); margin-top:-10px; margin-bottom:14px;}

table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); text-align:left; padding:8px 6px; border-bottom:1.5px solid var(--ink);}
td{padding:9px 6px; border-bottom:1px solid var(--line);}
.pos-chip{font-family:'IBM Plex Mono'; background:var(--waitlist-bg); color:var(--waitlist); border-radius:50%; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:600;}

.empty{
  border:1.5px dashed var(--line); border-radius:var(--radius); padding:34px 20px; text-align:center; color:var(--ink-soft);
}
.empty b{display:block; color:var(--ink); font-family:'Space Grotesk'; font-size:16px; margin-bottom:4px;}

.tabs{display:flex; gap:6px; margin-bottom:22px; border-bottom:1.5px solid var(--line);}
.tab{padding:9px 4px; margin-right:18px; font-size:13.5px; font-weight:600; color:var(--ink-soft); border-bottom:2.5px solid transparent; background:none; border-top:none; border-left:none; border-right:none;}
.tab.active{color:var(--ink); border-color:var(--brass);}

.search-row{display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap;}
.search-row input{flex:1; min-width:200px;}

/* auth */
.auth-wrap{display:flex; justify-content:center; padding:60px 20px;}
.auth-card{width:100%; max-width:420px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:32px; box-shadow:var(--shadow); position:relative;}
.auth-card::before{content:""; position:absolute; top:-1px; left:14px; right:14px; height:9px; background-image:radial-gradient(circle at 9px 0, var(--paper) 5.5px, transparent 6px); background-size:18px 9px; background-repeat:repeat-x;}
.auth-logo{text-align:center; margin-bottom:22px;}
.auth-logo .mark{font-size:26px; font-weight:700;}
.auth-logo .tag{font-family:'IBM Plex Mono'; font-size:11px; color:var(--brass); text-transform:uppercase; letter-spacing:.08em;}
.demo-box{margin-top:18px; padding:12px 14px; background:var(--paper); border-radius:var(--radius); font-family:'IBM Plex Mono'; font-size:11.5px; line-height:1.7; color:var(--ink-soft); border:1px dashed var(--line);}
.demo-box b{color:var(--ink);}
.err-msg{background:var(--danger-bg); color:var(--danger); font-size:12.5px; padding:9px 12px; border-radius:var(--radius); margin-bottom:14px;}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(22,41,77,0.45); display:flex; align-items:flex-start; justify-content:center; padding:48px 20px; z-index:100; overflow-y:auto; animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{width:100%; max-width:560px; background:var(--card); border-radius:var(--radius); padding:28px; position:relative; box-shadow:0 30px 60px -20px rgba(0,0,0,0.4);}
.modal h2{margin-top:0; font-size:20px;}
.modal-close{position:absolute; top:18px; right:18px; background:none; border:none; font-size:20px; color:var(--ink-soft); line-height:1;}

/* toast */
.toast-stack{position:fixed; bottom:22px; left:22px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--ink); color:var(--paper); padding:11px 16px; border-radius:var(--radius); font-size:13px; border-left:4px solid var(--brass); box-shadow:var(--shadow); animation:slideIn .2s ease;}
@keyframes slideIn{from{opacity:0; transform:translateX(-12px);} to{opacity:1; transform:translateX(0);}}

/* notification queue widget */
.queue-fab{
  position:fixed; bottom:22px; right:22px; z-index:150;
  background:var(--ink); color:var(--paper); border:1px solid var(--brass);
  border-radius:30px; padding:11px 18px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:8px; box-shadow:var(--shadow);
}
.queue-dot{width:8px; height:8px; border-radius:50%; background:var(--brass); animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}
.queue-panel{
  position:fixed; bottom:78px; right:22px; width:340px; max-height:60vh; overflow-y:auto;
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 24px 50px -18px rgba(22,41,77,0.4);
  z-index:150; padding:0;
}
.queue-head{padding:14px 16px; border-bottom:1.5px solid var(--ink); display:flex; justify-content:space-between; align-items:center;}
.queue-head b{font-family:'Space Grotesk'; font-size:14px;}
.queue-item{padding:11px 16px; border-bottom:1px solid var(--line); font-size:12px;}
.queue-item .jtype{font-family:'IBM Plex Mono'; font-weight:600; font-size:11px; color:var(--ink);}
.queue-item .jmeta{color:var(--ink-soft); margin-top:3px;}
.queue-item .jstatus{display:inline-block; margin-top:6px; font-family:'IBM Plex Mono'; font-size:10px; padding:2px 7px; border-radius:2px; text-transform:uppercase; letter-spacing:.05em;}
.jstatus.queued{background:var(--waitlist-bg); color:var(--waitlist);}
.jstatus.sent{background:var(--confirmed-bg); color:var(--confirmed);}

.section-gap{margin-top:46px;}
.note-strip{display:flex; gap:10px; align-items:flex-start; background:var(--paper-deep); border-left:3px solid var(--brass); padding:12px 14px; border-radius:0 var(--radius) var(--radius) 0; font-size:12.5px; color:var(--ink-soft); margin-bottom:22px;}
</style>
</head>
<body>

<div class="toast-stack" id="toastStack"></div>

<div id="root"></div>

<button class="queue-fab" id="queueFab" onclick="toggleQueue()">
  <span class="queue-dot"></span> Опашка за известия <span class="mono" id="queueCount">0</span>
</button>
<div class="queue-panel" id="queuePanel" style="display:none;"></div>

<script src="api-client.js"></script>
<script>
const uid = (p) => p + '-' + Math.random().toString(36).slice(2,9);
const nowISO = () => new Date().toISOString();
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleString('bg-BG', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
}

/* local cache (populated from backend responses) */
let db = {
  events: [],
  registrations: [], // for a student: their own regs (from /registrations/me)
  jobs: [],
};

let session = { user: null }; 
let view = { route:'auth', eventId:null, tab:'browse', orgTab:'events' };

/*  normalization: backend JSON -> internal shape  */
function normalizeEvent(e){
  return {
    id: e.id,
    organizerId: e.organizer_id ?? e.organizerId,
    title: e.title,
    description: e.description,
    startsAt: e.starts_at ?? e.startsAt,
    endsAt: e.ends_at ?? e.endsAt,
    location: e.location,
    capacity: e.capacity,
    status: e.status,
    createdAt: e.created_at ?? e.createdAt,
    confirmedCount: e.confirmed_count ?? e.confirmedCount ?? 0,
    waitlistCount: e.waitlist_count ?? e.waitlistCount ?? 0,
    myRegistration: e.my_registration ? normalizeRegistration(e.my_registration) : null,
  };
}
function normalizeRegistration(r){
  return {
    id: r.id,
    eventId: r.event_id ?? r.eventId,
    userId: r.user_id ?? r.userId,
    status: r.status,
    position: r.position ?? null,
    registeredAt: r.registered_at ?? r.registeredAt,
  };
}
function normalizeRegistrationWithUser(r){
  const base = normalizeRegistration(r);
  const u = r.user || {};
  return {
    ...base,
    userName: u.name ?? r.user_name ?? r.name ?? '—',
    userEmail: u.email ?? r.user_email ?? r.email ?? '—',
  };
}

/* domain read-helpers (now just read from the cache) */
function eventById(id){ return db.events.find(e=>e.id===id); }

/* data loading (reads from backend, refills the cache) */
async function loadEvents(){
  try{
    const raw = await Api.listEvents({ search: view.search, date: view.dateFilter });
    db.events = raw.map(normalizeEvent);
  }catch(err){
    toast('Грешка при зареждане на събития: ' + err.message);
  }
}
async function loadMyRegistrations(){
  try{
    const raw = await Api.myRegistrations();
    db.registrations = raw.map(normalizeRegistration);
  }catch(err){
    toast('Грешка при зареждане на регистрации: ' + err.message);
  }
}
async function loadInitialData(){
  if(session.user.role === 'student'){
    await Promise.all([loadEvents(), loadMyRegistrations()]);
  } else {
    await loadEvents();
  }
}

/* mutations (all go through the backend now) */
async function registerForEvent(eventId){
  try{
    const raw = await Api.registerForEvent(eventId);
    const reg = normalizeRegistration(raw);
    toast(reg.status === 'CONFIRMED'
      ? 'Записан си! Мястото е потвърдено.'
      : `Събитието е пълно — добавен си в чакащия списък на позиция ${reg.position ?? '?'}.`);
    await loadEvents();
    await loadMyRegistrations();
  }catch(err){
    toast('Грешка: ' + err.message);
  }
  renderApp();
}

async function cancelRegistration(regId){
  try{
    await Api.cancelRegistration(regId);
    toast('Регистрацията е отказана. Ако мястото е било потвърдено, следващият чакащ ще бъде повишен автоматично от бекенда.');
    await loadEvents();
    await loadMyRegistrations();
  }catch(err){
    toast('Грешка: ' + err.message);
  }
  renderApp();
}

async function createEvent(data){
  try{
    await Api.createEvent(data);
    toast('Чернова на събитието е създадена.');
    closeModal();
    await loadEvents();
  }catch(err){
    toast('Грешка: ' + err.message);
  }
  renderApp();
}
async function updateEvent(id, data){
  try{
    await Api.updateEvent(id, data);
    toast('Промените са запазени.');
    closeModal();
    await loadEvents();
  }catch(err){
    toast('Грешка: ' + err.message);
  }
  renderApp();
}
async function publishEvent(id){
  try{
    await Api.publishEvent(id);
    toast('Събитието е публикувано.');
    await loadEvents();
  }catch(err){
    toast('Грешка: ' + err.message);
  }
  renderApp();
}
async function cancelEvent(id){
  try{
    await Api.cancelEvent(id);
    toast('Събитието е отменено.');
    closeModal();
    await loadEvents();
  }catch(err){
    toast('Грешка: ' + err.message);
  }
  renderApp();
}

/* auth */
async function login(email, password){
  const data = await Api.login({ email, password });
  session.user = data.user;
  view.route = session.user.role === 'organizer' ? 'organizer' : 'student';
}
async function registerStudent(name, email, password){
  await Api.register({ name, email, password });
  // спецификацията: POST /register не логва автоматично — влизаме веднага след успешна регистрация
  await login(email, password);
}
async function logout(){
  try{ await Api.logout(); }catch(err){ /* ignore network errors on logout */ }
  session.user = null;
  db.events = [];
  db.registrations = [];
  view.route = 'auth';
  renderApp();
}

/* toasts */
function toast(msg){
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className='toast';
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3600);
}

/* notification queue panel */
const jobLabel = {
  RegistrationConfirmed:'Регистрация потвърдена',
  RegistrationWaitlisted:'Добавен в чакащ списък',
  RegistrationCancelled:'Регистрация отказана',
  WaitlistPromoted:'Повишен от чакащия списък',
  EventPublished:'Събитие публикувано',
  EventCancelled:'Събитие отменено',
};
let queuePollTimer = null;

async function toggleQueue(){
  const p = document.getElementById('queuePanel');
  const opening = p.style.display === 'none';
  p.style.display = opening ? 'block' : 'none';
  if(opening){
    await refreshQueue();
    queuePollTimer = setInterval(refreshQueue, 4000); // виж живо как job-овете минават queued -> sent
  } else if(queuePollTimer){
    clearInterval(queuePollTimer);
    queuePollTimer = null;
  }
}

// GET /notification-jobs — само debug/организаторски изглед според спецификацията.
// Ако твоят бекенд ограничава това само до организатори, извикай filter по event_id
// на организаторските събития вместо глобален списък.
async function refreshQueue(){
  if(!session.user) return;
  try{
    db.jobs = await Api.listNotificationJobs();
  }catch(err){
    db.jobs = [];
  }
  renderQueue();
}

function renderQueue(){
  const queuedCount = db.jobs.filter(j => (j.status||'').toLowerCase()==='queued' || (j.status||'').toLowerCase()==='pending').length;
  document.getElementById('queueCount').textContent = queuedCount;
  const p = document.getElementById('queuePanel');
  if(p.style.display==='none') return;
  if(!session.user){
    p.innerHTML = `<div class="queue-head"><b>Опашка за известия</b></div><div class="queue-item">Влез в системата, за да видиш опашката.</div>`;
    return;
  }
  if(!db.jobs.length){
    p.innerHTML = `<div class="queue-head"><b>Опашка за известия</b></div><div class="queue-item">Няма job-ове все още. Регистрирай се за събитие, за да видиш потока API → опашка → worker → имейл.</div>`;
    return;
  }
  p.innerHTML = `<div class="queue-head"><b>Опашка за известия</b><span class="mono" style="font-size:11px;color:var(--ink-soft)">${db.jobs.length} job-а</span></div>` +
    db.jobs.slice(0,25).map(j=>{
      const status = (j.status||'queued').toLowerCase();
      const isSent = status==='sent' || status==='done' || status==='completed';
      return `<div class="queue-item">
        <div class="jtype">${j.type}</div>
        <div class="jmeta">${jobLabel[j.type]||''}</div>
        <div class="jmeta mono">${j.id}</div>
        <span class="jstatus ${isSent?'sent':'queued'}">${isSent ? 'изпратено' : 'на опашка'}</span>
      </div>`;
    }).join('');
}

/* modal */
function closeModal(){
  const ex = document.getElementById('modalRoot');
  if(ex) ex.remove();
}
function openModal(html){
  closeModal();
  const wrap = document.createElement('div');
  wrap.id='modalRoot';
  wrap.className='modal-bg';
  wrap.onclick = (e)=>{ if(e.target===wrap) closeModal(); };
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(wrap);
}

/* views: AUTH */
function renderAuth(){
  const tab = view.authTab || 'login';
  return `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="mark">QUORUM</div>
        <div class="tag">Училищни събития и известия</div>
      </div>
      <div class="tabs" style="justify-content:center; border-bottom:1.5px solid var(--line);">
        <button class="tab ${tab==='login'?'active':''}" onclick="view.authTab='login'; renderApp();">Вход</button>
        <button class="tab ${tab==='register'?'active':''}" onclick="view.authTab='register'; renderApp();">Регистрация</button>
      </div>
      ${view.authError ? `<div class="err-msg">${view.authError}</div>` : ''}
      ${tab==='login' ? `
        <div class="field"><label>Имейл</label><input id="loginEmail" type="email" placeholder="име@school.edu"></div>
        <div class="field"><label>Парола</label><input id="loginPass" type="password" placeholder="••••••"></div>
        <button class="btn" style="width:100%; justify-content:center;" onclick="doLogin()">Вход</button>
        <div class="demo-box">
          <b>Свързано с бекенда:</b> ${CONFIG.API_BASE_URL || '(same origin)'}<br>
          <span style="color:var(--ink-soft)">Организаторски акаунти се създават от администратор — затова не са достъпни за саморегистрация през този формуляр.</span>
        </div>
      ` : `
        <div class="field"><label>Име</label><input id="regName" placeholder="Име и фамилия"></div>
        <div class="field"><label>Имейл</label><input id="regEmail" type="email" placeholder="име@school.edu"></div>
        <div class="field"><label>Парола</label><input id="regPass" type="password" placeholder="мин. 4 символа"></div>
        <button class="btn" style="width:100%; justify-content:center;" onclick="doRegister()">Създай студентски акаунт</button>
        <p class="hint" style="margin-top:14px;">Регистрацията през този формуляр винаги създава роля „студент“ — съгласно правилото от спецификацията.</p>
      `}
    </div>
  </div>`;
}
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  view.authError = null;
  try{
    await login(email, pass);
    await loadInitialData();
  }catch(err){
    view.authError = err.message || 'Грешен имейл или парола.';
  }
  renderApp();
}
async function doRegister(){
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  if(!name || !email || pass.length<4){ view.authError='Попълни всички полета (паролата — мин. 4 символа).'; renderApp(); return; }
  view.authError = null;
  try{
    await registerStudent(name, email, pass);
    await loadInitialData();
  }catch(err){
    view.authError = err.message || 'Регистрацията беше неуспешна.';
  }
  renderApp();
}

/* topbar */
function renderTopbar(){
  if(!session.user){
    return `<div class="topbar"><div class="brand"><span class="mark">QUORUM</span><span class="tag">Roster &amp; Notification Center</span></div></div>`;
  }
  const u = session.user;
  const links = u.role==='student'
    ? [['student','browse','Събития'],['student','mine','Моите регистрации']]
    : [['organizer','events','Моите събития']];
  return `
  <div class="topbar">
    <div class="brand"><span class="mark">QUORUM</span><span class="tag">Roster &amp; Notification Center</span></div>
    <div class="nav-links">
      ${links.map(([route,tab,label])=>`<button class="nav-btn ${view.route===route && (view.tab===tab||view.orgTab===tab) ?'active':''}" onclick="goto('${route}','${tab}')">${label}</button>`).join('')}
    </div>
    <div class="user-chip">
      <span class="role-tag">${u.role==='organizer'?'организатор':'студент'}</span>
      <span>${u.name}</span>
      <button class="logout-btn" onclick="logout()">Изход</button>
    </div>
  </div>`;
}
async function goto(route, tab){
  view.route = route;
  if(route==='student') view.tab = tab;
  if(route==='organizer') view.orgTab = tab;
  view.eventId = null;
  if(route==='student' && tab==='mine') await loadMyRegistrations();
  else await loadEvents();
  renderApp();
}

/* STUDENT: browse */
function renderStudentBrowse(){
  const q = (view.search||'').toLowerCase();
  let evs = db.events.filter(e=>e.status==='PUBLISHED');
  if(q) evs = evs.filter(e=> e.title.toLowerCase().includes(q) || (e.location||'').toLowerCase().includes(q));
  if(view.dateFilter) evs = evs.filter(e=> e.startsAt.slice(0,10) === view.dateFilter);
  evs.sort((a,b)=> new Date(a.startsAt)-new Date(b.startsAt));

  return `
  <div class="page-head">
    <div><p class="eyebrow">Каталог</p><h1>Публикувани събития</h1><p>Прегледай предстоящите лекции, клубове и работилници и се запиши с едно кликване.</p></div>
  </div>
  <div class="search-row">
    <input placeholder="Търсене по заглавие или зала…" value="${view.search||''}" oninput="onSearchInput(this.value)">
    <input type="date" value="${view.dateFilter||''}" onchange="view.dateFilter=this.value; loadEvents().then(renderApp);">
    ${(view.search||view.dateFilter) ? `<button class="btn ghost small" onclick="view.search='';view.dateFilter='';loadEvents().then(renderApp);">Изчисти</button>` : ''}
  </div>
  ${evs.length ? `<div class="card-grid">${evs.map(renderEventCard).join('')}</div>` : `
    <div class="empty"><b>Няма намерени събития</b>Опитай с друго търсене или провери по-късно — организаторите редовно публикуват нови събития.</div>
  `}`;
}
let searchDebounce = null;
function onSearchInput(val){
  view.search = val;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(()=> loadEvents().then(renderApp), 350);
}
function renderEventCard(ev){
  const confirmed = ev.confirmedCount;
  const isFull = confirmed >= ev.capacity;
  // ако бекендът не връща my_registration inline на event обекта, падаме назад към локалния кеш от /registrations/me
  const mine = ev.myRegistration || (session.user.role==='student'
    ? db.registrations.find(r=>r.eventId===ev.id && (r.status==='CONFIRMED'||r.status==='WAITLISTED'))
    : null);
  let actionHtml;
  if(mine){
    actionHtml = `<span class="stamp ${mine.status}" style="position:static; transform:none;">${mine.status==='CONFIRMED'?'Записан си':'В чакащия списък'}</span>`;
  } else {
    actionHtml = `<button class="btn small ${isFull?'brass':''}" onclick="registerForEvent('${ev.id}')">${isFull?'Запиши се (опашка)':'Запиши се'}</button>`;
  }
  return `
  <div class="card">
    <span class="stamp ${isFull?'FULL':'PUBLISHED'}">${isFull?'Пълно':'Публикувано'}</span>
    <h3>${escapeHtml(ev.title)}</h3>
    <p class="desc">${escapeHtml(ev.description||'')}</p>
    <div class="meta-row">
      <span><b>Начало:</b> ${fmtDate(ev.startsAt)}</span>
      <span><b>Локация:</b> ${escapeHtml(ev.location||'—')}</span>
      <span><b>Места:</b> ${confirmed} / ${ev.capacity}</span>
      <div class="cap-bar"><i style="width:${Math.min(100, confirmed/ev.capacity*100)}%"></i></div>
    </div>
    <div class="card-foot">${actionHtml}</div>
  </div>`;
}

/* STUDENT: my registrations */
function renderStudentMine(){
  const regs = db.registrations.filter(r=>r.userId===session.user.id)
    .sort((a,b)=> new Date(b.registeredAt)-new Date(a.registeredAt));
  return `
  <div class="page-head">
    <div><p class="eyebrow">Лична страница</p><h1>Моите регистрации</h1><p>Виждаш само собствените си записвания — статус и позиция в чакащия списък, ако приложимо.</p></div>
  </div>
  ${regs.length ? `<div class="panel"><table>
    <thead><tr><th>Събитие</th><th>Дата</th><th>Статус</th><th>Регистриран на</th><th></th></tr></thead>
    <tbody>
    ${regs.map(r=>{
      const ev = eventById(r.eventId);
      let statusHtml;
      if(r.status==='CONFIRMED') statusHtml = `<span class="stamp CONFIRMED" style="position:static; transform:none;">Потвърдена</span>`;
      else if(r.status==='WAITLISTED'){
        statusHtml = `<span class="stamp WAITLISTED" style="position:static; transform:none;">Чакащ <span class="pos-chip">${r.position ?? '-'}</span></span>`;
      } else statusHtml = `<span class="stamp CANCELLED" style="position:static; transform:none;">Отказана</span>`;
      return `<tr>
        <td><b>${escapeHtml(ev? ev.title : '—')}</b></td>
        <td class="mono">${ev? fmtDate(ev.startsAt):'—'}</td>
        <td>${statusHtml}</td>
        <td class="mono">${fmtDate(r.registeredAt)}</td>
        <td>${(r.status==='CONFIRMED'||r.status==='WAITLISTED') ? `<button class="btn ghost small" onclick="cancelRegistration('${r.id}')">Откажи</button>` : ''}</td>
      </tr>`;
    }).join('')}
    </tbody></table></div>` : `
    <div class="empty"><b>Все още нямаш регистрации</b>Разгледай каталога със събития и се запиши за първото.</div>
  `}`;
}

/* ORGANIZER: events list */
function renderOrganizerEvents(){
  const mine = db.events.filter(e=>e.organizerId===session.user.id).sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
  return `
  <div class="page-head">
    <div><p class="eyebrow">Организатор</p><h1>Моите събития</h1><p>Създавай чернови, публикувай ги за учениците и следи регистрациите и чакащия списък.</p></div>
    <button class="btn brass" onclick="openEventForm()">+ Ново събитие</button>
  </div>
  ${mine.length ? `<div class="card-grid">${mine.map(renderOrganizerCard).join('')}</div>` : `
    <div class="empty"><b>Нямаш създадени събития</b>Натисни „Ново събитие“, за да създадеш първата чернова.</div>
  `}`;
}
function renderOrganizerCard(ev){
  const confirmed = ev.confirmedCount;
  const waitlist = ev.waitlistCount;
  return `
  <div class="card">
    <span class="stamp ${ev.status}">${({DRAFT:'Чернова',PUBLISHED:'Публикувано',CANCELLED:'Отменено'})[ev.status]}</span>
    <h3>${escapeHtml(ev.title)}</h3>
    <p class="desc">${escapeHtml(ev.description||'')}</p>
    <div class="meta-row">
      <span><b>Начало:</b> ${fmtDate(ev.startsAt)}</span>
      <span><b>Потвърдени:</b> ${confirmed} / ${ev.capacity}</span>
      <span><b>Чакащи:</b> ${waitlist}</span>
    </div>
    <div class="card-foot">
      <button class="btn ghost small" onclick="openRegistrations('${ev.id}')">Регистрации</button>
      ${ev.status==='DRAFT' ? `<button class="btn ghost small" onclick="openEventForm('${ev.id}')">Редактирай</button>` : ''}
      ${ev.status==='DRAFT' ? `<button class="btn small" onclick="publishEvent('${ev.id}')">Публикувай</button>` : ''}
      ${ev.status!=='CANCELLED' ? `<button class="btn danger small" onclick="confirmCancelEvent('${ev.id}')">Отмени</button>` : ''}
      <button class="btn ghost small" onclick="openPreview('${ev.id}')">Преглед като студент</button>
    </div>
  </div>`;
}
function confirmCancelEvent(id){
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Отмяна на събитие</h2>
    <p style="font-size:14px; color:var(--ink-soft);">Всички активни регистрации (потвърдени и чакащи) за това събитие ще бъдат автоматично анулирани и ще се изпрати известие до засегнатите ученици. Това действие не може да бъде върнато.</p>
    <div style="display:flex; gap:10px; margin-top:18px;">
      <button class="btn danger" onclick="cancelEvent('${id}')">Да, отмени събитието</button>
      <button class="btn ghost" onclick="closeModal()">Назад</button>
    </div>
  `);
}

/* ORGANIZER: create / edit form */
function openEventForm(id){
  const ev = id ? eventById(id) : null;
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${ev? 'Редактирай чернова' : 'Ново събитие (чернова)'}</h2>
    <p class="hint" style="margin-top:-4px;">Само събития в статус „чернова“ могат да бъдат редактирани — публикувай, когато си готов.</p>
    <div class="field"><label>Заглавие</label><input id="fTitle" value="${ev?escapeAttr(ev.title):''}" placeholder="напр. Клуб по роботика"></div>
    <div class="field"><label>Описание</label><textarea id="fDesc" placeholder="Кратко описание за учениците">${ev?escapeHtml(ev.description||''):''}</textarea></div>
    <div class="field-row">
      <div class="field"><label>Начало</label><input id="fStart" type="datetime-local" value="${ev?ev.startsAt:''}"></div>
      <div class="field"><label>Край</label><input id="fEnd" type="datetime-local" value="${ev?ev.endsAt:''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Капацитет</label><input id="fCap" type="number" min="1" value="${ev?ev.capacity:''}"></div>
      <div class="field"><label>Локация / линк</label><input id="fLoc" value="${ev?escapeAttr(ev.location||''):''}" placeholder="Зала 101 или https://…"></div>
    </div>
    <div id="formErr" class="err-msg" style="display:none;"></div>
    <button class="btn" style="width:100%; justify-content:center;" onclick="submitEventForm('${ev?ev.id:''}')">${ev?'Запази промените':'Създай чернова'}</button>
  `);
}
function submitEventForm(id){
  const title = document.getElementById('fTitle').value.trim();
  const description = document.getElementById('fDesc').value.trim();
  const startsAt = document.getElementById('fStart').value;
  const endsAt = document.getElementById('fEnd').value;
  const capacity = parseInt(document.getElementById('fCap').value, 10);
  const location = document.getElementById('fLoc').value.trim();
  const errEl = document.getElementById('formErr');
  if(!title || !startsAt || !capacity || capacity<1){
    errEl.style.display='block';
    errEl.textContent = 'Попълни заглавие, начална дата и капацитет (цяло число ≥ 1).';
    return;
  }
  const data = {title, description, startsAt, endsAt, capacity, location};
  if(id) updateEvent(id, data); else createEvent(data);
}

/* ORGANIZER: registrations + waitlist */
async function openRegistrations(eventId){
  const ev = eventById(eventId);
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${escapeHtml(ev.title)}</h2>
    <p class="hint">Зареждане на регистрации…</p>
  `);
  let confirmed = [], waitlist = [];
  try{
    const [confirmedRaw, waitlistRaw] = await Promise.all([
      Api.eventRegistrations(eventId),
      Api.eventWaitlist(eventId),
    ]);
    confirmed = confirmedRaw.map(normalizeRegistrationWithUser);
    waitlist = waitlistRaw.map(normalizeRegistrationWithUser);
  }catch(err){
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h2>${escapeHtml(ev.title)}</h2>
      <div class="err-msg">Грешка при зареждане: ${err.message}</div>
    `);
    return;
  }
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${escapeHtml(ev.title)}</h2>
    <p class="hint" style="margin-top:-6px;">${confirmed.length} / ${ev.capacity} потвърдени · ${waitlist.length} в чакащ списък (FIFO)</p>
    <h3 style="font-size:14px; margin-bottom:8px;">Потвърдени</h3>
    ${confirmed.length ? `<table><thead><tr><th>Студент</th><th>Имейл</th><th>Регистриран</th></tr></thead><tbody>
      ${confirmed.map(r=>`<tr><td>${escapeHtml(r.userName)}</td><td class="mono">${escapeHtml(r.userEmail)}</td><td class="mono">${fmtDate(r.registeredAt)}</td></tr>`).join('')}
    </tbody></table>` : `<p class="hint">Все още няма потвърдени регистрации.</p>`}
    <h3 style="font-size:14px; margin:18px 0 8px;">Чакащ списък (по ред на записване)</h3>
    ${waitlist.length ? `<table><thead><tr><th>#</th><th>Студент</th><th>Имейл</th><th>Регистриран</th></tr></thead><tbody>
      ${waitlist.map((r,i)=>`<tr><td><span class="pos-chip">${r.position ?? (i+1)}</span></td><td>${escapeHtml(r.userName)}</td><td class="mono">${escapeHtml(r.userEmail)}</td><td class="mono">${fmtDate(r.registeredAt)}</td></tr>`).join('')}
    </tbody></table>` : `<p class="hint">Няма ученици в чакащия списък.</p>`}
  `);
}

/* ORGANIZER: preview as student */
function openPreview(eventId){
  const ev = eventById(eventId);
  const confirmed = ev.confirmedCount;
  const isFull = confirmed >= ev.capacity;
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>Преглед като студент</h2>
    <p class="hint" style="margin-top:-6px;">Така ще изглежда събитието в каталога, след като бъде публикувано.</p>
    <div class="card-grid" style="grid-template-columns:1fr;">
      ${renderEventCardPreview(ev, confirmed, isFull)}
    </div>
  `);
}
function renderEventCardPreview(ev, confirmed, isFull){
  return `
  <div class="card">
    <span class="stamp ${isFull?'FULL':'PUBLISHED'}">${isFull?'Пълно':(ev.status==='DRAFT'?'(чернова) ще е публикувано':'Публикувано')}</span>
    <h3>${escapeHtml(ev.title)}</h3>
    <p class="desc">${escapeHtml(ev.description||'')}</p>
    <div class="meta-row">
      <span><b>Начало:</b> ${fmtDate(ev.startsAt)}</span>
      <span><b>Локация:</b> ${escapeHtml(ev.location||'—')}</span>
      <span><b>Места:</b> ${confirmed} / ${ev.capacity}</span>
      <div class="cap-bar"><i style="width:${Math.min(100, confirmed/ev.capacity*100)}%"></i></div>
    </div>
    <div class="card-foot"><button class="btn small" disabled>Запиши се</button></div>
  </div>`;
}

/* helpers */
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }

/* main render */
function renderApp(skipScroll){
  const root = document.getElementById('root');
  let body = '';
  if(!session.user){
    body = renderAuth();
  } else if(session.user.role==='student'){
    body = view.tab==='mine' ? renderStudentMine() : renderStudentBrowse();
  } else {
    body = renderOrganizerEvents();
  }
  root.innerHTML = renderTopbar() + `<main>${body}</main>`;
  if(!skipScroll) window.scrollTo({top:0});
}

renderApp();
renderQueue();
</script>
</body>
</html>
